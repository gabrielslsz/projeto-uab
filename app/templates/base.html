<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistema de Atendimento{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --sa-bg: #0f172a;
            --sa-surface: rgba(15, 23, 42, 0.82);
            --sa-card: #ffffff;
            --sa-accent: #2563eb;
            --sa-text: #1f2937;
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(37, 99, 235, 0.22), transparent 28%),
                radial-gradient(circle at bottom right, rgba(14, 165, 233, 0.16), transparent 24%),
                linear-gradient(180deg, #f8fafc 0%, #e2e8f0 100%);
            color: var(--sa-text);
        }

        .app-shell {
            min-height: 100vh;
        }

        .app-navbar {
            background: var(--sa-surface);
            backdrop-filter: blur(16px);
        }

        .app-brand {
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .app-panel {
            background: var(--sa-card);
            border: 1px solid rgba(148, 163, 184, 0.18);
            border-radius: 1.25rem;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
        }
    </style>
</head>
<body>
    <div class="app-shell d-flex flex-column">
        <nav class="navbar navbar-dark app-navbar">
            <div class="container py-2">
                <span class="navbar-brand mb-0 h1 app-brand">Sistema de Atendimento</span>
            </div>
        </nav>

        <main class="container flex-grow-1 py-5">
            <div class="row justify-content-center">
                <div class="col-12 col-lg-8 col-xl-7">
                    <section class="app-panel p-4 p-md-5">
                        {% block content %}{% endblock %}
                    </section>
                </div>
            </div>
        </main>

        <footer class="container pb-4">
            <div class="text-center text-muted small">Sistema de Atendimento</div>
        </footer>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
