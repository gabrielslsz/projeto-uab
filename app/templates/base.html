<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gratia{% endblock %}</title>
    
    <!-- Third Party Assets -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <!-- Gratia Design System -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/frontend.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Skip to Content for Accessibility -->
    <a href="#main-content" class="visually-hidden-focusable">Pular para o conteúdo principal</a>

    <div class="container py-4 py-md-5">
        <header class="text-center mb-4 mb-md-5">
            <h1 class="display-4">Gratia</h1>
            <p class="text-pastoral">"Paz e Bem"</p>
        </header>
        
        <main id="main-content" class="row justify-content-center">
            <div class="col-md-8 col-lg-6 col-xl-5 fade-in">
                {% block content %}{% endblock %}
            </div>
        </main>

        <footer class="text-center mt-5">
            <hr class="w-25 mx-auto opacity-25">
            <p class="small text-muted mt-3">© 2026 Gratia - Sistema de Atendimento Pastoral</p>
        </footer>
    </div>

    <!-- Core Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/frontend.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
