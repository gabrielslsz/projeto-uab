<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gratia{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/frontend.css') }}" rel="stylesheet">
    <style>
        /* Mantido mínimo para permitir leitura rápida do layout base; o sistema visual vive em frontend.css. */
    </style>
</head>
<body>
    <a class="skip-link" href="#main-content">Pular para o conteúdo principal</a>
    <div class="app-shell d-flex flex-column">
        <nav class="navbar navbar-dark app-navbar" aria-label="Barra principal">
            <div class="container py-2">
                <div>
                    <span class="navbar-brand mb-0 h1 app-brand">Gratia</span>
                    <div class="brand-subtitle text-white-50 small">Paz e Bem</div>
                </div>
            </div>
        </nav>

        <main id="main-content" class="container flex-grow-1 py-5" tabindex="-1">
            <div class="row justify-content-center">
                <div class="col-12 col-lg-8 col-xl-7">
                    <section class="app-panel p-4 p-md-5" aria-label="Conteúdo principal">
                        {% block content %}{% endblock %}
                    </section>
                </div>
            </div>
        </main>

        <footer class="container pb-4">
            <div class="text-center text-muted small">Gratia</div>
        </footer>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/frontend.js') }}" defer></script>
</body>
</html>
